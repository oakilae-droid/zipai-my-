<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 - zipai 부동산</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../static/css/board.css">
</head>
<body>
    <div class="board-container">
        <h2 class="page-title mb-4">Q&A 글쓰기</h2>
        
        <form id="writeForm" class="write-form">
            <div class="mb-4">
                <label for="postTitle" class="form-label">제목 <span class="text-danger">*</span></label>
                <input type="text" class="form-control form-control-lg" id="postTitle" placeholder="제목을 입력해 주세요. (최대 50자)">
            </div>
            
            <div class="mb-4">
                <label for="postContent" class="form-label">내용 <span class="text-danger">*</span></label>
                <!-- 실제 서비스에서는 CKEditor나 Summernote 등의 WYSIWYG 에디터가 들어가는 자리입니다. -->
                <textarea class="form-control editor-area" id="postContent" placeholder="질문 내용을 상세히 작성해 주시면 더욱 정확한 답변을 받을 수 있습니다."></textarea>
            </div>

            <div class="mb-4">
                <label for="postFile" class="form-label">첨부파일</label>
                <input class="form-control" type="file" id="postFile">
                <div class="form-text text-muted mt-2"><i class="fas fa-info-circle"></i> 이미지 파일(jpg, png) 최대 5MB까지 업로드 가능합니다.</div>
            </div>

            <div class="d-flex justify-content-center gap-2 mt-5">
                <a href="qna.html" class="btn btn-outline-custom px-5">취소</a>
                <button type="submit" class="btn btn-primary-custom px-5">등록 완료</button>
            </div>
        </form>
    </div>
    <script src="../../static/js/board.js"></script>
</body>
</html>
