<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤 대출 찾기 - zipai</title>
    <link rel="stylesheet" href="../../static/css/common.css">
    <link rel="stylesheet" href="../../static/css/trend.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- [헤더 메뉴바 위치] -->

    <main class="trend-wrapper">
        <div class="container">
            <div class="mb-4">
                <a href="trend1.html" style="color:var(--secondary-color); text-decoration:none;"><i class="fas fa-arrow-left"></i> 뒤로가기</a>
            </div>
            <div class="page-header">
                <h2>조건 기반 맞춤 대출 찾기</h2>
                <p>본인의 자격 요건과 목적을 선택하시면 최적의 정부지원 대출을 추천해 드립니다.</p>
            </div>

            <form id="loanFilterForm" class="filter-box">
                <div class="filter-group">
                    <label for="targetType">대상(요건)</label>
                    <select id="targetType">
                        <option value="general">일반 무주택자</option>
                        <option value="youth">청년 (만 19세~34세)</option>
                        <option value="newlywed">신혼부부 (혼인 7년 이내)</option>
                        <option value="lowincome">취약계층 / 다자녀가구</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="loanPurpose">자금 용도</label>
                    <select id="loanPurpose">
                        <option value="purchase">주택 구입 (매매)</option>
                        <option value="jeonse">전세 보증금</option>
                        <option value="monthly">월세 지원</option>
                    </select>
                </div>
                <button type="submit" class="btn-search"><i class="fas fa-search"></i> 맞춤 상품 검색</button>
            </form>

            <!-- 동적 결과 출력 영역 -->
            <div class="result-list" id="filterResults">
                <div style="text-align:center; color:#999; padding:40px;">
                    <i class="fas fa-search fa-3x mb-3" style="color:#e0e0e0;"></i><br>
                    <strong>대출 대상을 검색해 보세요.</strong><br>
                    <span style="font-size:0.9rem;">조건을 선택하고 검색 버튼을 누르면 추천 상품이 나타납니다.</span>
                </div>
            </div>
        </div>
    </main>

    <!-- [푸터 위치] -->
    <script src="../../static/js/trend.js"></script>
</body>
</html>
